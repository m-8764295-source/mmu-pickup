<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>MMU Pickup</title>
  <style>
    body {
      font-family: Arial;
      background: #f5f5f5;
      text-align: center;
    }
    h1 {
      color: #2e7d32;
    }
    .menu {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-top: 20px;
    }
    .card {
      background: white;
      padding: 15px;
      border-radius: 15px;
      width: 200px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    }
    img {
      width: 100%;
      border-radius: 10px;
    }
    button {
      margin-top: 10px;
      padding: 10px;
      border: none;
      background: #4caf50;
      color: white;
      border-radius: 10px;
      cursor: pointer;
    }
    .order-box {
      margin-top: 30px;
    }
  </style>
</head>

<body>

<h1>MMU Pickup Order</h1>

<div class="menu">
  <div class="card">
    <img src="soy.jpg">
    <h3>Soy Milk</h3>
    <button onclick="addToCart('Soy Milk', 3)">Add</button>
  </div>

  <div class="card">
    <img src="matcha.jpg">
    <h3>Matcha Soy</h3>
    <button onclick="addToCart('Matcha Soy', 5)">Add</button>
  </div>

  <div class="card">
    <img src="oden.jpg">
    <h3>Oden</h3>
    <button onclick="addToCart('Oden', 6)">Add</button>
  </div>
</div>

<div class="order-box">
  <button onclick="checkout()">Order Now</button>
</div>

<hr>

<h2>📦 Orders (老板看这里)</h2>
<div id="orders"></div>

<!-- 🔥 Firebase -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCrHpyeQLT6sJXFvJh2SVlvHLZ9O8TGoC4",
  authDomain: "mmu-pickup.firebaseapp.com",
  projectId: "mmu-pickup",
  storageBucket: "mmu-pickup.firebasestorage.app",
  messagingSenderId: "179973696161",
  appId: "1:179973696161:web:ba81ec80dac3018f0c5ee0",
  measurementId: "G-M1ET8EB6WR"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let cart = [];

// 加入购物车
function addToCart(name, price){
  cart.push({name, price});
  alert(name + " added!");
}

// 下单
async function checkout(){
  if(cart.length === 0){
    alert("Cart kosong!");
    return;
  }

  let orderId = "MMU" + Math.floor(Math.random()*10000);

  await addDoc(collection(db, "orders"), {
    id: orderId,
    items: cart,
    time: new Date()
  });

  alert("✅ Order sent!");
  cart = [];

  loadOrders(); // 更新老板页面
}

// 显示订单（老板用）
async function loadOrders(){
  const querySnapshot = await getDocs(collection(db, "orders"));
  let html = "";

  querySnapshot.forEach((doc) => {
    let data = doc.data();
    html += `<div style="background:white;padding:10px;margin:10px;border-radius:10px;">
      <b>${data.id}</b><br>
      ${data.items.map(i => i.name).join(", ")}
    </div>`;
  });

  document.getElementById("orders").innerHTML = html;
}

loadOrders();

window.addToCart = addToCart;
window.checkout = checkout;

</script>

</body>
</html>
